services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - upload-data:/app/data/uploads

  # --- Celery services (no longer required) ---
  # Task dispatching now uses FastAPI BackgroundTasks + admin cron endpoints.
  # Kept here for reference in case a move to a real task queue is needed later.
  #
  # celery-worker:
  #   build: ./backend
  #   command: celery -A app.workers.celery_app worker -l info -c 2
  #   env_file: ./backend/.env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #
  # celery-beat:
  #   build: ./backend
  #   command: celery -A app.workers.celery_app beat -l info
  #   env_file: ./backend/.env
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobapp
      POSTGRES_USER: jobapp
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  upload-data:
